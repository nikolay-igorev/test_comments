{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock title %}
{% block content %}
  <div class="row">
    <div class="col-md-5 col-12">
      <h2 class="mb-3">{{ heading }}</h2>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">{{ submit_button }}</button>
      </form>
    </div>
  </div>
{% endblock content %}
