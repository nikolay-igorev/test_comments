{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Log In{% endblock title %}
{% block content %}
  <div class="row">
    <div class="col-md-5 col-12">
      <h2>Log In</h2>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>
    </div>
  </div>
{% endblock content %}
